schema_version: 1

context:
  name: ros-jazzy-cv-kit
  # Suite version — keep in sync across recipe/*/recipe.yaml (see recipe/README.md).
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # Repo root (this recipe lives in recipe/ros-jazzy-cv-kit/). use_gitignore skips
  # .pixi/, build/, output/. build.sh installs only the cv_kit package.
  path: ../..
  use_gitignore: true

build:
  # Pure-Python (JITs C++ at runtime via cppyy, nothing compiled at build time)
  # -> noarch python: one artifact for every platform/python.
  noarch: python
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools >=61
  run:
    - python
    - cppyy-kit ==0.1.0
    - opencv >=4,<5

tests:
  - script:
      # Fresh-env import smoke (rattler-build resolves run deps in an isolated
      # test env). The richer proof runs in the driver (recipe/prove_all.sh).
      - python -c "import cv_kit; print('cv_kit', cv_kit.__file__)"

about:
  homepage: https://github.com/awesomebytes/cppyy_kit
  repository: https://github.com/awesomebytes/cppyy_kit
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "Drive OpenCV's C++ API from Python via cppyy (zero-copy Image->cv::Mat)"
  description: |
    cv_kit drives OpenCV's C++ API (core/imgproc/features2d) from Python via
    cppyy, with a zero-copy bridge from a C++ sensor_msgs/Image into cv::Mat.

extra:
  recipe-maintainers:
    - awesomebytes
