schema_version: 1

context:
  name: ros-jazzy-rclcpp-kit
  # Suite version — keep in sync across recipe/*/recipe.yaml (see recipe/README.md).
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # Repo root (this recipe lives in recipe/ros-jazzy-rclcpp-kit/). use_gitignore skips
  # .pixi/, build/, output/. build.sh installs only the rclcpp_kit package.
  path: ../..
  use_gitignore: true

build:
  # Pure-Python (JITs C++ at runtime via cppyy, nothing compiled at build time)
  # -> noarch python: one artifact for every platform/python.
  noarch: python
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools >=61
  run:
    - python
    - cppyy-kit ==0.1.0
    - ros-jazzy-rclcpp
    - ros-jazzy-rclpy
    - ros-jazzy-ament-index-python

tests:
  - script:
      # Fresh-env import smoke (rattler-build resolves run deps in an isolated
      # test env). The richer proof runs in the driver (recipe/prove_all.sh).
      - python -c "import rclcpp_kit; print('rclcpp_kit', rclcpp_kit.__file__)"

about:
  homepage: https://github.com/awesomebytes/cppyy_kit
  repository: https://github.com/awesomebytes/cppyy_kit
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "Drive rclcpp (ROS 2 core) from Python via cppyy: bringup, messages, tf, rosbag2"
  description: |
    rclcpp_kit is the kit for rclcpp (ROS 2 core): rclcpp bringup, C++ message
    resolution/conversion, serialization, rosbag2_cpp, tf, and executor/node
    helpers, all driven from Python via cppyy. The ROS-touching kits build on it.

extra:
  recipe-maintainers:
    - awesomebytes
