schema_version: 1

context:
  name: ros-jazzy-control-kit
  # Suite version — keep in sync across recipe/*/recipe.yaml (see recipe/README.md).
  version: "0.1.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  # Repo root (this recipe lives in recipe/ros-jazzy-control-kit/). use_gitignore skips
  # .pixi/, build/, output/. build.sh installs only the control_kit package.
  path: ../..
  use_gitignore: true

build:
  # Pure-Python (JITs C++ at runtime via cppyy, nothing compiled at build time)
  # -> noarch python: one artifact for every platform/python.
  noarch: python
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools >=61
  run:
    - python
    - cppyy-kit ==0.1.0
    - ros-jazzy-rclcpp-kit ==0.1.0
    - ros-jazzy-ros2-control

tests:
  - script:
      # Fresh-env import smoke (rattler-build resolves run deps in an isolated
      # test env). The richer proof runs in the driver (recipe/prove_all.sh).
      - python -c "import control_kit; print('control_kit', control_kit.__file__)"

about:
  homepage: https://github.com/awesomebytes/cppyy_kit
  repository: https://github.com/awesomebytes/cppyy_kit
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "Run a Python ros2_control controller inside the real controller_manager via cppyy"
  description: |
    control_kit runs a Python controller cross-inherited from the real
    controller_interface::ControllerInterface inside an in-process
    controller_manager, driven by the real read/update/write loop — via cppyy.

extra:
  recipe-maintainers:
    - awesomebytes
